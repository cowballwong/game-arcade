<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Skate 3D — by Asher</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#87CEEB; font-family:'Comic Sans MS','Segoe UI',sans-serif; touch-action:none; }
  #c { display:block; width:100%; height:100%; }
  .hud { position:fixed; top:14px; left:0; right:0; text-align:center; color:#fff; font-size:24px; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,.45); pointer-events:none; z-index:5; }
  .hud small { display:block; font-size:15px; opacity:.9; margin-top:2px; }
  .btns { position:fixed; bottom:22px; left:0; right:0; display:flex; justify-content:center; gap:18px; z-index:6; }
  .btn { width:78px; height:78px; border-radius:50%; background:rgba(255,255,255,.28); border:3px solid rgba(255,255,255,.7);
         color:#fff; font-size:32px; display:flex; align-items:center; justify-content:center; user-select:none; }
  .btn:active { background:rgba(255,255,255,.5); transform:scale(.94); }
  .btn.jump { width:96px; height:96px; font-size:24px; background:rgba(255,200,60,.42); border-color:#ffd54a; }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10;
            background:rgba(20,30,60,.62); color:#fff; text-align:center; padding:24px; }
  .screen.hidden { display:none; }
  .screen h1 { font-size:40px; margin-bottom:6px; text-shadow:0 3px 10px rgba(0,0,0,.4); }
  .screen p { font-size:19px; margin:6px 0; max-width:340px; line-height:1.5; }
  .play { margin-top:20px; padding:16px 40px; font-size:24px; font-weight:bold; color:#123; background:#ffd54a; border:none;
          border-radius:40px; box-shadow:0 6px 0 #c79a1f; cursor:pointer; }
  .play:active { transform:translateY(4px); box-shadow:0 2px 0 #c79a1f; }
  .big { font-size:52px; color:#ffd54a; margin:8px 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><div id="score">0</div><small id="best"></small></div>

<div class="btns" id="btns" style="display:none">
  <div class="btn" id="bL">◀</div>
  <div class="btn jump" id="bJ">JUMP</div>
  <div class="btn" id="bR">▶</div>
</div>

<div class="screen" id="startScreen">
  <h1>🛹 Skate 3D</h1>
  <p>Made by <b>Asher</b> 🎮</p>
  <p>Dodge the red blocks, grab the gold coins, see how far you can go!<br>It gets faster the longer you survive 😎</p>
  <p><small>◀ ▶ move · JUMP to hop · (arrows + space on a keyboard)</small></p>
  <button class="play" id="startBtn">▶ PLAY</button>
</div>

<div class="screen hidden" id="overScreen">
  <h1>Wipeout! 💥</h1>
  <div class="big" id="finalScore">0</div>
  <p id="bestMsg"></p>
  <button class="play" id="againBtn">↻ PLAY AGAIN</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const LANES = [-2.2, 0, 2.2];
const SPAWN_Z = -70;                       // where new rows appear (far ahead)
const $ = id => document.getElementById(id);

const renderer = new THREE.WebGLRenderer({ canvas: $('c'), antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 34, 80);
const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 200);
function resize(){ renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.9); sun.position.set(-8, 20, 10); scene.add(sun);

// track + rails
const track = new THREE.Mesh(new THREE.BoxGeometry(9, 1, 400), new THREE.MeshStandardMaterial({ color:0x5b6b7a }));
track.position.set(0, -0.6, -180); scene.add(track);
for (const s of [-1,1]){
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 400), new THREE.MeshStandardMaterial({ color:0xf4c542 }));
  rail.position.set(s*4.4, 0.1, -180); scene.add(rail);
}
// scrolling dashes (speed feel)
const stripes = [], STRIPE_SPAN = 240;
for (let i=0;i<40;i++){
  const st = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.02, 2.4), new THREE.MeshStandardMaterial({ color:0xffffff }));
  st.position.set(0, 0.02, -i*6); scene.add(st); stripes.push(st);
}

// player
const player = new THREE.Group();
const board = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.14, 2.0), new THREE.MeshStandardMaterial({ color:0xff5533 }));
const body  = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.9, 0.5), new THREE.MeshStandardMaterial({ color:0x2ec4ff })); body.position.y=0.62;
const head  = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshStandardMaterial({ color:0xffd7a0 })); head.position.y=1.25;
for (const [x,z] of [[-0.35,0.7],[0.35,0.7],[-0.35,-0.7],[0.35,-0.7]]){
  const w = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.12,12), new THREE.MeshStandardMaterial({ color:0x222222 }));
  w.rotation.z=Math.PI/2; w.position.set(x,-0.02,z); board.add(w);
}
player.add(board, body, head); scene.add(player);

// pools
const obMat = new THREE.MeshStandardMaterial({ color:0xe03636 });
const coinMat = new THREE.MeshStandardMaterial({ color:0xffd54a, metalness:0.4, roughness:0.3 });
const obstacles = [], coins = [];
for (let i=0;i<12;i++){ const o=new THREE.Mesh(new THREE.BoxGeometry(1.4,1.4,1.4), obMat); o.visible=false; scene.add(o); obstacles.push(o); }
for (let i=0;i<21;i++){ const c=new THREE.Mesh(new THREE.TorusGeometry(0.4,0.16,10,20), coinMat); c.visible=false; scene.add(c); coins.push(c); }

// state
let state='start', lane=1, targetX=0, py=0, vy=0, onGround=true;
let speed=17, dist=0, score=0, nextSpawnDist=0, spin=0;
const GRAV=-55, JUMP_V=17;
let best=+(localStorage.getItem('skate3d_best')||0);
$('best').textContent = best ? 'Best: '+best : '';

function reset(){
  lane=1; targetX=0; py=0; vy=0; onGround=true;
  speed=17; dist=0; score=0; nextSpawnDist=0;
  obstacles.forEach(o=>o.visible=false); coins.forEach(c=>c.visible=false);
  player.position.set(0,0,0); player.rotation.z=0; $('score').textContent='0';
}
function spawnRow(){
  const obLane = Math.floor(Math.random()*3);
  const o = obstacles.find(o=>!o.visible);
  if (o){ o.visible=true; o.position.set(LANES[obLane], 0.7, SPAWN_Z); }
  if (Math.random()<0.85){
    let cLane = Math.floor(Math.random()*3);
    if (cLane===obLane) cLane=(cLane+1)%3;
    for (let k=0;k<3;k++){ const c=coins.find(c=>!c.visible); if(c){ c.visible=true; c.position.set(LANES[cLane],0.9,SPAWN_Z-k*2.2); } }
  }
}
function move(d){ if(state!=='play')return; lane=Math.max(0,Math.min(2,lane+d)); targetX=LANES[lane]; }
function jump(){ if(state!=='play')return; if(onGround){ vy=JUMP_V; onGround=false; } }
function start(){ reset(); state='play'; $('startScreen').classList.add('hidden'); $('overScreen').classList.add('hidden'); $('btns').style.display='flex'; }
function gameOver(){
  state='over'; $('btns').style.display='none'; $('finalScore').textContent=score;
  if (score>best){ best=score; localStorage.setItem('skate3d_best',best); $('bestMsg').textContent='🏆 NEW BEST SCORE!'; }
  else $('bestMsg').textContent='Best: '+best;
  $('best').textContent='Best: '+best; $('overScreen').classList.remove('hidden');
}

$('startBtn').onclick=start; $('againBtn').onclick=start;
$('bL').onclick=()=>move(-1); $('bR').onclick=()=>move(1); $('bJ').onclick=jump;
addEventListener('keydown', e=>{
  if (e.repeat) return;
  if (e.key==='ArrowLeft'||e.key==='a') move(-1);
  else if (e.key==='ArrowRight'||e.key==='d') move(1);
  else if (e.key===' '||e.key==='ArrowUp'||e.key==='w'){ e.preventDefault(); state==='play'?jump():start(); }
});
let sx=0,sy=0;
addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if (Math.abs(dx)<26 && Math.abs(dy)<26) return;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1); else if (dy<0) jump();
}, {passive:true});

let last=performance.now();
function tick(now){
  requestAnimationFrame(tick);   // schedule next frame FIRST so an early return (game over) never kills the loop
  const dt=Math.min(0.05,(now-last)/1000); last=now; spin+=dt;
  if (state==='play'){
    speed += dt*0.85;                        // gradually harder
    dist  += speed*dt;
    score  = Math.floor(dist);
    $('score').textContent = score;

    player.position.x += (targetX-player.position.x)*Math.min(1,dt*12);
    if (!onGround){ vy+=GRAV*dt; py+=vy*dt; if(py<=0){ py=0; vy=0; onGround=true; } }
    player.position.y = py;
    player.rotation.z = (targetX-player.position.x)*0.25;
    board.rotation.x = onGround ? 0 : -0.5;

    for (const st of stripes){ st.position.z += speed*dt; if (st.position.z>8) st.position.z -= STRIPE_SPAN; }

    const px = player.position.x;
    for (const o of obstacles){ if(!o.visible) continue;
      o.position.z += speed*dt;
      if (o.position.z>-1 && o.position.z<1 && Math.abs(o.position.x-px)<1.0 && py<1.25) return gameOver();
      if (o.position.z>9) o.visible=false;
    }
    for (const c of coins){ if(!c.visible) continue;
      c.position.z += speed*dt; c.rotation.y += dt*5;
      if (c.position.z>-1 && c.position.z<1 && Math.abs(c.position.x-px)<1.0 && Math.abs(py-0.9)<1.2){ c.visible=false; dist+=12; }
      else if (c.position.z>9) c.visible=false;
    }
    if (dist>=nextSpawnDist){ spawnRow(); nextSpawnDist = dist + (11 + Math.random()*6); }
  }
  camera.position.set(player.position.x*0.5, 4.2, 7);
  camera.lookAt(player.position.x*0.4, 1.2, -6);
  renderer.render(scene, camera);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
